name: Feature Request
description: Suggest a new feature for FaultRay
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: We'd love to hear your ideas!
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
